name: live-feeds

# Nightly smoke against real RSS/Reddit — catches feed-shape drift.
# On failure: opens (or updates) a GitHub issue so the owner is paged.

on:
  schedule:
    - cron: "15 3 * * *" # ~03:15 UTC
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Live-feed smoke (@live)
        id: live
        run: npm run test:e2e:live
        env:
          CI: "1"
          # No PW_TEST — hit real feeds. No BETA_TOKEN in CI.

      - name: Page owner on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 Live-feed canary failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly \`@live\` smoke failed on \`${context.sha.slice(0, 7)}\`.`,
              "",
              `Run: ${runUrl}`,
              "",
              "This issue is opened automatically so feed-shape drift is not silent.",
              "Close it after the canary is green again.",
            ].join("\n");

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "canary",
              per_page: 10,
            });
            const existing = open.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Failed again: ${runUrl}`,
              });
              core.info(`Commented on existing #${existing.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["canary"],
              });
              core.info(`Opened #${issue.data.number}`);
            }
